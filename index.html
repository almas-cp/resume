<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Almas — Resume</title>
  <meta name="description" content="View and download Almas's resume.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --border: rgba(255,255,255,0.08);
      --text: #e4e4eb;
      --text-muted: #8888a0;
      --accent: #7c6aef;
      --accent-glow: rgba(124,106,239,0.35);
    }

    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Ambient background blobs ── */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 420px; height: 420px;
      background: var(--accent);
      top: -120px; left: -80px;
    }
    body::after {
      width: 340px; height: 340px;
      background: #e0528a;
      bottom: -100px; right: -60px;
    }

    /* ── Layout ── */
    .wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Top bar ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      background: rgba(26,26,36,0.65);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    .actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 16px var(--accent-glow);
    }
    .btn-primary:hover {
      box-shadow: 0 4px 24px var(--accent-glow);
      background: #6b58e0;
    }

    .btn-ghost {
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover {
      background: rgba(255,255,255,0.1);
    }

    /* ── PDF viewer area ── */
    .viewer {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    .pdf-frame {
      width: 100%;
      max-width: 900px;
      height: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: var(--surface);
      box-shadow: 0 8px 60px rgba(0,0,0,0.45);
    }

    .pdf-frame iframe,
    .pdf-frame embed {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ── Fallback (shown when embed fails / mobile) ── */
    .fallback {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      text-align: center;
      padding: 40px;
      height: 100%;
    }
    .fallback svg {
      width: 64px;
      height: 64px;
      opacity: 0.5;
    }
    .fallback p {
      color: var(--text-muted);
      font-size: 0.95rem;
      max-width: 340px;
      line-height: 1.6;
    }

    /* ── Mobile tweaks ── */
    @media (max-width: 600px) {
      header { padding: 12px 16px; }
      .logo { font-size: 1rem; }
      .btn { padding: 8px 14px; font-size: 0.8rem; }
      .viewer { padding: 12px; }
      .pdf-frame { border-radius: 10px; }
      /* On most mobile browsers, inline PDF viewing doesn't work */
      .pdf-frame iframe,
      .pdf-frame embed { display: none; }
      .fallback { display: flex; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <!-- Top bar -->
    <header>
      <div class="logo">
        <span class="dot"></span>
        Almas &middot; Resume
      </div>
      <div class="actions">
        <a class="btn btn-ghost"
           href="https://github.com/almas-cp/resume"
           target="_blank" rel="noopener">
          <!-- GitHub icon -->
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.37.5 0 5.78 0 12.292c0 5.21 3.438 9.63 8.205 11.188.6.111.82-.254.82-.567 0-.28-.01-1.022-.015-2.005-3.338.711-4.042-1.582-4.042-1.582-.546-1.361-1.333-1.723-1.333-1.723-1.09-.73.083-.716.083-.716 1.205.083 1.838 1.215 1.838 1.215 1.07 1.802 2.807 1.281 3.492.98.108-.763.417-1.282.76-1.577-2.665-.296-5.466-1.309-5.466-5.827 0-1.287.465-2.339 1.228-3.164-.123-.298-.532-1.497.117-3.12 0 0 1.001-.314 3.28 1.209A11.5 11.5 0 0 1 12 6.844c1.02.005 2.047.136 3.006.398 2.277-1.523 3.276-1.209 3.276-1.209.65 1.623.241 2.822.118 3.12.764.825 1.226 1.877 1.226 3.164 0 4.53-2.805 5.527-5.475 5.818.43.364.814 1.083.814 2.182 0 1.575-.014 2.846-.014 3.232 0 .316.216.683.825.567C20.565 21.917 24 17.497 24 12.292 24 5.78 18.627.5 12 .5z"/></svg>
          Repo
        </a>
        <a class="btn btn-primary"
           href="Almas_Resume_v2k.pdf"
           download>
          <!-- Download icon -->
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download
        </a>
      </div>
    </header>

    <!-- PDF embed -->
    <div class="viewer">
      <div class="pdf-frame" id="pdfFrame">
        <iframe src="Almas_Resume_v2k.pdf" title="Almas Resume"></iframe>

        <!-- Fallback for browsers / devices that can't inline PDFs -->
        <div class="fallback" id="fallback">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <line x1="10" y1="9" x2="8" y2="9"/>
          </svg>
          <p>Your browser can't display the PDF inline. Tap the button below to view or download it.</p>
          <a class="btn btn-primary" href="Almas_Resume_v2k.pdf" target="_blank">
            Open Resume
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    // If the iframe fails to render (common on mobile), show fallback
    const iframe = document.querySelector('#pdfFrame iframe');
    if (iframe) {
      iframe.addEventListener('error', () => {
        iframe.style.display = 'none';
        document.getElementById('fallback').style.display = 'flex';
      });
    }
  </script>
</body>
</html>
